- defaults:
    link:
      create: true
      relink: true

- clean: ["~", "~/.config"]

- shell:
    - [mkdir -p ~/.config/nano]
    - [mkdir -p ~/.nano-backups]
    - [mkdir -p ~/.vim]

- link:
#    ~/.dotfiles: ""
    ~/.bash_aliases: bash/bash_aliases
    ~/.bashrc: bash/bashrc
    ~/.bashrc.local: bash/bashrc.local
    ~/.config/nano/nanorc: nano/nanorc
    ~/.config/doublecmd/:
      glob: true
      path: .config/doublecmd/*
      relink: true
    ~/.config/openbox/:
      glob: true
      path: .config/openbox/*
      relink: true
    ~/.config/rofi/:
      glob: true
      path: .config/rofi/*
      relink: true
    ~/.config/tint2/:
      glob: true
      path: .config/tint2/*
      relink: true
    ~/.config/compton.conf: .config/compton.conf
    ~/.gitconfig: git/gitconfig
    ~/.gitignore: git/gitignore
    ~/.tmux.conf: tmux/tmux.conf
    ~/.tmux.conf.local: tmux/tmux.conf.local
#    ~/.vim: vim/
    ~/.vim/:
      glob: true
      path: vim/*
      relink: true
    ~/.vimrc: vim/vimrc
    ~/.zshrc: zsh/zshrc
    ~/.zshrc_local_after: zsh/zshrc_local_after

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - sh -c "$(curl -fsSL https://raw.githubusercontent.com/zdharma/zplugin/master/doc/install.sh)"
#  - [git clone https://github.com/zsh-users/zsh-syntax-highlighting.git ~/.oh-my-zsh/custom/plugins/ ,Installing oh-my-zsh]
#  - git clone https://github.com/VundleVim/Vundle.vim.git ~/.vim/bundle/Vundle.vim
  - command: vim +PlugInstall +PlugUpdate +qall

