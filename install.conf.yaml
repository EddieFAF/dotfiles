- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshenv: zshenv
    ~/.Xresources: Xresources
    ~/.config/tmux/.tmux.conf: tmux/tmux.conf
    ~/.vim: vim
    ~/.vimrc: vimrc

- create:
    - ~/bin
    - ~/.vim/undo-history

- shell:
  - [git submodule update --init --recursive, Installing submodules]

