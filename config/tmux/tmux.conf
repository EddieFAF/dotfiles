

# 0 is too far from ` ;)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# C-b is not acceptable -- Vim uses it
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

set -g default-terminal screen-256color
set -ga terminal-overrides ",xterm-256color:Tc"
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

set -g status-keys vi
set -g history-limit 10000

setw -g mode-keys vi
setw -g mouse on

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

bind-key v split-window -h -c '#{pane_current_path}'
bind-key s split-window -v -c '#{pane_current_path}'
bind-key | split-window -h -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-h resize-pane -L
bind-key M-l resize-pane -R

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-vim keys without prefix key to switch panes
#bind -n M-h select-pane -L
#bind -n M-j select-pane -D
#bind -n M-k select-pane -U
#bind -n M-l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

bind -n M-1 selectw -t:1
bind -n M-2 selectw -t:2
bind -n M-3 selectw -t:3
bind -n M-4 selectw -t:4
bind -n M-5 selectw -t:5
bind -n M-6 selectw -t:6
bind -n M-7 selectw -t:7
bind -n M-8 selectw -t:8
bind -n M-9 selectw -t:9

# trigger copy mode by
bind -n M-Up copy-mode
# Scroll up/down by 1 line, half screen, whole screen
bind -T copy-mode-vi M-Up              send-keys -X scroll-up
bind -T copy-mode-vi M-Down            send-keys -X scroll-down
bind -T copy-mode-vi M-PageUp          send-keys -X halfpage-up
bind -T copy-mode-vi M-PageDown        send-keys -X halfpage-down
bind -T copy-mode-vi PageDown          send-keys -X page-down
bind -T copy-mode-vi PageUp            send-keys -X page-up

bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down

bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# kill the current pane
bind-key q confirm-before -p "Kill pane '#{pane_index}'? (y/n):" "kill-pane"

# Window picker - shows windows in current session with preview
bind w display-popup -w 70% -h 70% -E '~/.config/tmux/scripts/tmux_window_picker.sh'

# Session picker - shows sessions with preview (Ctrl-N to create new)
bind f display-popup -w 70% -h 70% -E '~/.config/tmux/scripts/tmux_session_picker.sh'

# Tmux catalog picker - shows all sessions/windows with descriptions
bind F display-popup -w 90% -h 90% -E '~/.config/tmux/scripts/tmux_catalog.sh'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# No delay for escape key press
setw -g monitor-activity on
set -g bell-action none


set-option -g status "on"

set -g @continuum-restore 'off'

set -g mode-style "fg=#82aaff,bg=#3b4261"

#set-option -g status-position top

set -g status-justify "left"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

# default statusbar color
set -g status-style fg=white,bg=colour234

# default window title colors
set-window-option -g window-status-style bg=colour214,fg=colour237 # bg=yellow, fg=bg1

# default window with an activity alert
set-window-option -g window-status-activity-style bg=colour237,fg=colour248 # bg=bg1, fg=fg3

# active window title colors
set-window-option -g window-status-current-style bg=red,fg=colour237 # fg=bg1

# pane border
set-option -g pane-active-border-style fg=colour250 #fg2
set-option -g pane-border-style fg=colour237 #bg1

# message infos
set-option -g message-style bg=colour239,fg=colour223 # bg=bg2, fg=fg1

# writing commands inactive
set-option -g message-command-style bg=colour239,fg=colour223 # bg=fg3, fg=bg1

# pane number display
set-option -g display-panes-active-colour colour250 #fg2
set-option -g display-panes-colour colour237 #bg1

# clock
set-window-option -g clock-mode-colour colour109 #blue

# bell
set-window-option -g window-status-bell-style bg=colour167,fg=colour235 # bg=red, fg=bg

onedark_black="#282c34"
onedark_blue="#61afef"
onedark_yellow="#e5c07b"
onedark_red="#e06c75"
onedark_white="#aab2bf"
onedark_green="#98c379"
onedark_visual_grey="#3e4452"
onedark_comment_grey="#5c6370"

# Define colors
BG_COLOR="#1A1D23"
ACTIVE_COLOR="#b4befe"
INACTIVE_COLOR="#6c7086"
TEXT_COLOR="#cdd6f4"
ACCENT_COLOR="#b4befe"

wg_prfx=" #[fg=$onedark_black,bg=$onedark_blue]#{?client_prefix,[O],}"

# Status left (session name with minimal styling)
#set -g status-left "#[fg=$ACCENT_COLOR,bold]  #S #[fg=$INACTIVE_COLOR]│ "
set -g status-left "#[fg=default,bg=default,bold]  #S "
set -ga status-left "#[fg=default,bg=default] "
#set -g status-left-length 24


#set -g status-right "#[bg=default]"
set -g status-right "#{prefix_highlight} #[fg=colour11]  #([ #{pane_current_path} = $HOME ] && echo '~' || basename #{pane_current_path}) #[fg=default] | #h |  %d.%m.%Y |  %H:%M "
#set -g status-right-length 60

setw -g window-status-format '#[bg=default,fg=colour7] #{window_index}:#W#F '
setw -g window-status-current-format '#[bg=colour12,fg=colour0] #{window_index}:#W#F '
setw -g window-status-activity-style 'fg=#ff9e64,bg=#1a1b26'
setw -g window-status-bell-style 'fg=#ad8ee6,bg=#1a1b26'

# Configure tmux-prefix-highlight colors
set -g @prefix_highlight_output_prefix ''
set -g @prefix_highlight_output_suffix ''
set -g @prefix_highlight_show_copy_mode 'on'

set -g "@prefix_highlight_fg" "black"
set -g "@prefix_highlight_bg" "colour10"
set -g "@prefix_highlight_copy_mode_attr" "fg=black,bg=yellow"
set -g @prefix_highlight_empty_attr 'fg=black,bg=cyan' # default is 'fg=default,bg=default'
set -g @prefix_highlight_empty_prompt ' TMUX '
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt ' Copy '
set -g @prefix_highlight_sync_prompt ' Sync '

setw -g window-status-activity-style "underscore,fg=#828bb8,bg=#1e2030"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#828bb8,bg=#1e2030"

set-window-option -g pane-border-status top
set-window-option -g pane-border-format "#[align=left]#[fg=dim] #{s|$HOME|~|:pane_current_path} "
set -g pane-active-border-style fg=terminal,bold
set -g pane-border-style fg=colour8,dim,overline

# Install TPM if it isn't already installed
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'
if "test ! -d ~/.local/share/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.local/share/tmux/plugins/tpm/tpm'

run-shell -b 'lazy-tmux daemon --interval 3m --scrollback>/tmp/lazy-tmux.log 2>&1 || tmux display-message "lazy-tmux daemon already running"'
bind-key f display-popup -w 75% -h 85% -E 'lazy-tmux picker'
bind-key C-s run-shell 'lazy-tmux save --all --scrollback && tmux display-message "All sessions saved successfully!"'

